http:
  port: 80
  maxHeaderBytes: 1
  readTimeout: 10s
  writeTimeout: 10s

cache:
  ttl: 3600s

mysql:
  host: localhost
  port: 3306
  user: root
  password: root1234
  databaseName: testDatabase

fileStorage:
  endpoint: test.filestorage.com
  bucket: test

auth:
