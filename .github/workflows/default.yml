name: Linter & Tests

on:
  push:
    branches:
      - '**'
      - '!main'
      - '!develop'
  pull_request:
    branches:
      - '**'
      - '!main'
      - '!develop'

env:
  TEST_CONTAINER_NAME: "test_db"
  TEST_DB_NAME: "test"
  TEST_MYSQL_HOST: "localhost"
  TEST_MYSQL_PORT: "3306"
  TEST_MYSQL_USER: "root"
  TEST_MYSQL_PASSWORD: "root1234"

jobs:

  linter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v2
        with:
          version: v1.41

  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Install Go
        uses: actions/setup-go@v2
        with:
          go-version: "1.18"

      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install mockgen
        run: go install github.com/golang/mock/mockgen@v1.6.0

      - name: Generate mocks
        run: |
          cd api
          export PATH=$PATH:$(go env GOPATH)/bin
          mockgen -source=internal/service/service.go -destination=internal/service/mocks/mock.go
          mockgen -source=internal/repository/repository.go -destination=internal/repository/mocks/mock.go

      - name: Unit Tests
        run: cd api && go test --short -coverprofile=cover.out -v ./...

      - name: Create test db container
        run: docker run --rm -d -p 3306:3306 --name $(echo $TEST_CONTAINER_NAME) -e MYSQL_ROOT_PASSWORD=root1234 -e MYSQL_DATABASE=test mysql:8.0

      - name: Integration Tests
        run: cd api && GIN_MODE=release go test -v ./tests/

      - name: Kill test db container
        run: docker stop $(echo $TEST_CONTAINER_NAME)